[package]
name = "ranchero"
version = "0.1.0"
edition = "2024"

[lib]
name = "ranchero"
path = "src/lib.rs"

[[bin]]
name = "ranchero"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
directories = "5"
ratatui = "0.29"
crossterm = "0.28"

[dev-dependencies]
tempfile = "3"
